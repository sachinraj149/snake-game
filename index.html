<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
   <body>
    <h1>SNAKE XENZIA</h1>
    <div class="stats">Score: <span id="scoreVal">0</span></div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div class="controls">
        <button class="btn" style="grid-area: up" onclick="setDir('UP')">↑</button>
        <button class="btn" style="grid-area: left" onclick="setDir('LEFT')">←</button>
        <button class="btn" style="grid-area: right" onclick="setDir('RIGHT')">→</button>
        <button class="btn" style="grid-area: down" onclick="setDir('DOWN')">↓</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
